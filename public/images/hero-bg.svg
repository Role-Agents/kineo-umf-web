<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Hero background gradient with overlay">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="50%" stop-color="#2E7DAE"/>
      <stop offset="100%" stop-color="#00B5AD"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  <rect y="400" width="1200" height="200" fill="url(#overlay)"/>
</svg>